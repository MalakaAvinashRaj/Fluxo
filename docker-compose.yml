services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      AGENT_HOST: "0.0.0.0"
      AGENT_PORT: "8080"
      LOG_FORMAT: "json"
      # Preview URL prefix used in iframe src.
      # Set to empty string so URLs are relative (works through Nginx in prod).
      PREVIEW_BASE_URL: ""
    volumes:
      # Allow backend to spawn Flutter build containers
      - /var/run/docker.sock:/var/run/docker.sock
      # Persist session state and RAG index across restarts
      - ./backend/sessions:/app/sessions
      - ./backend/chroma_db:/app/chroma_db
      # Flutter build output (served via /preview/ endpoint)
      - ./backend/flutter_output:/app/flutter_output
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # React production build (run `npm run build` in frontend/ first)
      - ./frontend/dist:/var/www/frontend:ro
    depends_on:
      backend:
        condition: service_healthy
