upstream backend {
    server backend:8080;
}

server {
    listen 80;
    server_name _;

    # React SPA — built files mounted at /var/www/frontend
    root /var/www/frontend;
    index index.html;

    # ── API: Session management, health, tools, stats ────────────────────────
    location ~ ^/(health|tools|stats|live-preview)$ {
        proxy_pass http://backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── Session CRUD + chat (with SSE streaming support) ────────────────────
    location /sessions/ {
        proxy_pass http://backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE / streaming — disable all buffering
        proxy_buffering            off;
        proxy_cache                off;
        proxy_read_timeout         3600s;
        proxy_send_timeout         3600s;
        chunked_transfer_encoding  on;

        # Required for SSE to work through nginx
        proxy_set_header Connection '';
        proxy_http_version 1.1;
    }

    # ── Flutter preview (static files served by the backend) ─────────────────
    location /preview/ {
        proxy_pass http://backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── React SPA catch-all (client-side routing) ────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Gzip for text assets
    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
    gzip_min_length 1024;
}
